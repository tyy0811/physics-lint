# physics-lint calibrated floors
#
# Generated by scripts/calibrate_floors.py. Each [[floor]] entry records the
# measured residual/error for a (rule, pde, grid_shape, method, norm) tuple
# from the analytical battery. The stored `value` is the raw measurement;
# `tolerance` is applied at rule evaluation time via _tristate(
#     ratio, pass_=floor.tolerance * 10, fail_=floor.tolerance * 100
# ) — so PASS up to 20× (fd4) or 30× (spectral) of the calibrated value,
# WARN beyond that, FAIL at 200× / 300×.
#
# Calibration discipline (design doc §6.4):
#   - Run scripts/calibrate_floors.py in multiple environments.
#   - Take the MAXIMUM value observed across environments as floor.value.
#   - The CI matrix (.github/workflows/ci.yml — 6 jobs across ubuntu/macOS,
#     py3.10-3.12, numpy 1.26/2.0, torch 2.0/2.2/2.5) IS the multi-environment
#     validator for this file.
#
# Week-2 calibration source: macOS x86_64 / Python 3.11.4 / NumPy 1.26.4 /
# PyTorch 2.2.2. Second-environment validation is deferred to the 6-job CI
# matrix; any CI job that trips on a floor boundary should cause a bump
# commit on the failing entry. Week-2 additions: heat (spectral Bochner-H-1),
# wave (fd4 Bochner-L2), and conservation rules PH-CON-001/002/003.

schema_version = 1

[[floor]]
rule = "PH-RES-001"
pde = "laplace"
grid_shape = [64, 64]
method = "fd4"
norm = "L2"
value = 1.003e-12
tolerance = 2.0
analytical_solution = "harmonic_polynomial_square"
citation = "Week 1 Day 4 calibration, commit <auto>"

